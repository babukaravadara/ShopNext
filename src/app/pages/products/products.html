<div class="row">

  <div class="col-md-4 mb-4"
       *ngFor="let product of products$ | async">

    <div class="card h-100 shadow">
      <img [src]="product.image"
           class="card-img-top"
           alt="Product"
           width="300"
           height="250">
      <div class="card-body">
        <h5>
          {{product.name}}
        </h5>
        <p>
          {{product.description}}
        </p>
        <h6 class="mb-3">
          ₹ {{product.price}}

        </h6>

        <button class="btn btn-dark w-100 mb-2" (click)="BuyProduct(product)">Buy Now</button>
        <button class="btn btn-outline-primary w-100" (click)="addToCart(product)">
          Add To Cart
        </button>

      </div>

    </div>

  </div>

</div>
 <!-- Empty Cart State Definition -->
 <div *ngIf="products && products.length === 0">
  <div class="alert alert-warning py-4 text-center">
    <h4 class="alert-heading">No product found</h4>
  </div>
</div>
