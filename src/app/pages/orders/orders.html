<div class="container">

  <h2 class="mb-4 text-center">
    My Orders
  </h2>

  <div class="row">

    <div class="col-lg-4 col-md-6 mb-4"
         *ngFor="let order of orders$ | async">

      <div class="card shadow h-100">

        <img [src]="order.imageUrl "class="card-img-top"
             style=" height:220px; object-fit:cover;">

        <div class="card-body">

          <h5>
            {{order.productName}}
          </h5>

          <p>
            <strong>Order Id:</strong>
            #{{order.orderId}}
          </p>

          <p>
            <strong>Price:</strong>
            ₹ {{order.price}}
          </p>

          <p>
            <strong>Quantity:</strong>
            {{order.quantity}}
          </p>

          <span class="badge"
                [ngClass]="{
              'bg-success':
                order.status === 'Delivered',

              'bg-warning':
                order.status === 'Processing',

              'bg-primary':
                order.status === 'Shipped'
            }">

            {{order.status}}

          </span>

        </div>

      </div>

    </div>

  </div>
  <div *ngIf="orders && orders.length === 0">
  <div class="alert alert-warning py-4 text-center">
    <h4 class="alert-heading">No orders found</h4>
  </div>
</div>
</div>
