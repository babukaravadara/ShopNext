<div class="container mt-4">
  <div class="row">
    <div class="col-md-8">
      <div class="card shadow p-4">
        <h3 class="mb-4">
          Checkout
        </h3>
        <form [formGroup]="checkoutForm"
              (ngSubmit)="placeOrder()">
          <div class="mb-3">
            <label>
              Delivery Address
            </label>
            <textarea class="form-control"
                      formControlName="address">
            </textarea>
            <small class="text-danger"
                   *ngIf="
         submitted &&
         checkoutForm.controls['address'].errors">
              Address is required
            </small>
          </div>
          <div class="mb-3">
            <label>
              Phone Number
            </label>
            <input type="text"
                   class="form-control"
                   formControlName="phone">
          </div>
          <small class="text-danger"
                 *ngIf="submitted &&
checkoutForm.controls['phone']?.errors?.['required']">
            phone is required
          </small>
          <small class="text-danger"
                 *ngIf="submitted &&
               checkoutForm.controls['phone']?.errors?.['pattern']">
            Only numbers are allowed
          </small>
          <button class="btn btn-success w-100">
            Place Order
          </button>
        </form>
      </div>

    </div>
    <div class="col-md-4">
      <div class="card shadow p-4">
        <h4>
          Order Summary
        </h4>
        <hr>
        <h5>
          Total:
          ₹ {{this.total}}
        </h5>
      </div>

    </div>
  </div>
</div>
