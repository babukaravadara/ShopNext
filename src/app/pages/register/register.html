<div class="register-container">

  <mat-card class="register-card">

    <mat-card-header>
      <mat-card-title>
        User Registration
      </mat-card-title>
    </mat-card-header>
    <br />
    <mat-card-content>

      <form [formGroup]="registerForm"
            (ngSubmit)="register()">

        <!-- Name -->
        <mat-form-field appearance="outline"
                        class="full-width"
                        subscriptSizing="dynamic">

          <mat-label>Full Name</mat-label>

          <input matInput
                 formControlName="name"
                 placeholder="Enter full name">

          <mat-error *ngIf="submitted && registerForm.get('name')?.errors?.['required']">
            Name is required
          </mat-error>

        </mat-form-field>

        <!-- Email -->
        <mat-form-field appearance="outline"
                        class="full-width"
                        subscriptSizing="dynamic">

          <mat-label>Email</mat-label>

          <input matInput
                 type="email"
                 formControlName="email"
                 placeholder="Enter email">

          <mat-error *ngIf="submitted && registerForm.get('email')?.errors?.['required']">
            Email is required
          </mat-error>

          <mat-error *ngIf="submitted && registerForm.get('email')?.errors?.['email']">
            Invalid email format
          </mat-error>

        </mat-form-field>

        <!-- Password -->
        <mat-form-field appearance="outline"
                        class="full-width"
                        subscriptSizing="dynamic">

          <mat-label>Password</mat-label>

          <input matInput
                 [type]="hidePassword ? 'password' : 'text'"
                 formControlName="password"
                 placeholder="Enter password">
       

          <mat-error *ngIf="submitted && registerForm.get('password')?.errors?.['required']">
            Password is required
          </mat-error>

          <mat-error *ngIf="submitted && registerForm.get('password')?.errors?.['minlength']">
            Minimum 6 characters required
          </mat-error>

        </mat-form-field>

        <!-- Confirm Password -->
        <mat-form-field appearance="outline"
                        class="full-width"
                        subscriptSizing="dynamic">

          <mat-label>Confirm Password</mat-label>

          <input matInput
                 [type]="hideConfirmPassword ? 'password' : 'text'"
                 formControlName="confirmPassword"
                 placeholder="Confirm password">

         
        </mat-form-field>

        <!-- Button -->
        <button mat-raised-button
                color="primary"
                type="submit"
                class="register-btn">
          Register
        </button>

      </form>

    </mat-card-content>

  </mat-card>

</div>
