<div class="container mt-3">

  <!-- Header Area with Toggle Button -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="m-0">Manage Product</h3>

    <!-- This button reveals the form when clicked -->
    <button mat-raised-button
            color="primary"
            *ngIf="!showForm"
            (click)="openAddForm()">
      + Add New Product
    </button>
  </div>

  <!-- Product Form Card (Only visible when showForm is true) -->
  <mat-card class="p-3 mb-3 shadow-sm" *ngIf="showForm">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h5 class="m-0 text-muted">{{ isEdit ? 'Modify Product Details' : 'Add New Product' }}</h5>
      <button mat-icon-button (click)="closeForm()" type="button" class="text-danger">
        Cancel
      </button>
    </div>

    <form [formGroup]="productForm" (ngSubmit)="submitForm()">
      <div class="row g-2">

        <div class="col-md-6">
          <mat-form-field appearance="outline" class="w-100" subscriptSizing="dynamic">
            <mat-label>Product Name</mat-label>
            <input matInput formControlName="name">
          </mat-form-field>
        </div>

        <div class="col-md-6">
          <mat-form-field appearance="outline" class="w-100" subscriptSizing="dynamic">
            <mat-label>Price</mat-label>
            <input matInput type="number" formControlName="price">
          </mat-form-field>
        </div>

        <div class="col-md-6">
          <mat-form-field appearance="outline" class="w-100" subscriptSizing="dynamic">
            <mat-label>Quantity</mat-label>
            <input matInput type="number" formControlName="quantity">
          </mat-form-field>
        </div>

        <div class="col-md-6">
          <div class="d-flex align-items-center border rounded px-3" style="height: 40px; margin-top: 4px;">
            <button type="button" class="btn btn-sm btn-primary me-2" (click)="fileInput.click()">
              Upload Image
            </button>
            <input type="file" hidden #fileInput accept="image/*" (change)="onFileSelected($event)">
            <small class="text-success text-truncate m-0" *ngIf="selectedFileName">
              {{ selectedFileName }}
            </small>
          </div>
        </div>

        <div class="col-md-12">
          <mat-form-field appearance="outline" class="w-100" subscriptSizing="dynamic">
            <mat-label>Description</mat-label>
            <textarea matInput formControlName="description" rows="2"></textarea>
          </mat-form-field>
        </div>

      </div>

      <div class="mt-3 d-flex gap-2">
        <button mat-raised-button color="primary" type="submit">
          {{ isEdit ? 'Update Product' : 'Save Product' }}
        </button>
        <button mat-button type="button" (click)="closeForm()">
          Close
        </button>
      </div>
    </form>
  </mat-card>

  <!-- Table Card (Always visible) -->
  <mat-card class="shadow-sm p-2">
    <table mat-table [dataSource]="products" class="mat-elevation-z2 w-100">

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let element">{{ element.name }}</td>
      </ng-container>
      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let element">{{ element.description }}</td>
      </ng-container>

      <ng-container matColumnDef="quantity">
        <th mat-header-cell *matHeaderCellDef>Quantity</th>
        <td mat-cell *matCellDef="let element">{{ element.quantity }}</td>
      </ng-container>

      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef>Price</th>
        <td mat-cell *matCellDef="let element">₹ {{ element.price }}</td>
      </ng-container>

      <ng-container matColumnDef="image">
        <th mat-header-cell *matHeaderCellDef>Image</th>
        <td mat-cell *matCellDef="let element">
          <img [src]="element.image" width="40" height="40" style="object-fit: cover; border-radius: 4px;">
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let element">
          <button mat-flat-button color="accent" class="me-2 btn-sm-custom" (click)="editProduct(element)">
            Edit
          </button>
          <button mat-flat-button color="warn" class="btn-sm-custom" (click)="deleteProduct(element.id)">
            Delete
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card>
</div>
